# ==========================
# 1. CORE SETTINGS
# ==========================
set -g default-shell /usr/bin/zsh
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g mouse on

# Fix colors and enable true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Optimization
set -s escape-time 0
set -g history-limit 50000
set -g status-interval 5

# Enable Vi-style copy mode (v to select, y to yank)
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ==========================
# 2. KEYBINDINGS
# ==========================
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# Open splits in Current Working Directory (CWD)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"  # Create new window in CWD too

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# NOTE: We removed manual 'bind h/j/k/l' here. 
# The 'vim-tmux-navigator' plugin handles this automatically 
# to allow seamless switching between Neovim splits and Tmux panes.

# ==========================
# 3. ROUNDED & DYNAMIC STATUS BAR
# ==========================
set-option -g status-position top
set -g status-style bg=default,fg=white
set -g status-justify left
set -g status-left-length 200
set -g status-right-length 200

# Left Side: Session Name
set -g status-left "#[fg=#82aaff,bg=default,bold]#[fg=#1b1d2b,bg=#82aaff,bold] ❐ #S #[fg=#82aaff,bg=default,bold] "

# Right Side: Directory Info
set -g status-right "#[fg=#82aaff,bg=default]#[fg=#1b1d2b,bg=#82aaff,bold]  #{pane_current_path} #[fg=#82aaff,bg=default]"

# Window List Styling
setw -g window-status-format "#[fg=#82aaff,bg=default]  #I #W  "
setw -g window-status-current-format "#[fg=#82aaff,bg=default]#[fg=#1b1d2b,bg=#82aaff,bold]#I #W#[fg=#82aaff,bg=default]"
setw -g window-status-separator ""

# ==========================
# 4. PLUGINS
# ==========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator' # Handles C-h/j/k/l
set -g @plugin 'tmux-plugins/tmux-yank'        # Copy to system clipboard

# FZF for Tmux (Super fast session switching)
# Press prefix + F to search sessions/windows
set -g @plugin 'sainnhe/tmux-fzf'
TMUX_FZF_LAUNCH_KEY="F"

# Resurrect & Continuum (Keep sessions alive across reboots)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'off'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
