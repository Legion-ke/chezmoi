# =========================================================================
# 1. CORE SETTINGS
# =========================================================================
set -g default-shell /usr/bin/zsh
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Prefix Setup: Primary Ctrl-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g base-index 1           # Start windows at 1
setw -g pane-base-index 1     # Start panes at 1
set -g renumber-windows on     # Re-index when a window is closed
set -g mouse on               # Enable mouse support
set -g escape-time 0          # No delay for escape key (crucial for nvim)
set -g history-limit 50000
set -g focus-events on
set -g status-interval 5

# =========================================================================
# 2. KEYBINDINGS
# =========================================================================

# Reload Config (Points to the modern .config location)
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

# Open splits in Current Working Directory (CWD)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vi-style copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# =========================================================================
# 3. ROUNDED & DYNAMIC STATUS BAR
# =========================================================================
set-option -g status-position top
set -g status-style "bg=default,fg=white"
set -g status-justify left
set -g status-left-length 200
set -g status-right-length 200

# Colors (Nord-ish Blue theme)
# Left Side: Session Name with rounded separators
set -g status-left "#[fg=#82aaff,bg=default,bold]#[fg=#1b1d2b,bg=#82aaff,bold] ❐ #S #[fg=#82aaff,bg=default,bold] "

# Right Side: Current Path with rounded separators
set -g status-right "#[fg=#82aaff,bg=default]#[fg=#1b1d2b,bg=#82aaff,bold]  #{pane_current_path} #[fg=#82aaff,bg=default]"

# Window List Styling
setw -g window-status-format "#[fg=#82aaff,bg=default]  #I #W  "
setw -g window-status-current-format "#[fg=#82aaff,bg=default]#[fg=#1b1d2b,bg=#82aaff,bold]#I #W#[fg=#82aaff,bg=default]"
setw -g window-status-separator ""

# =========================================================================
# 4. PLUGINS (TPM)
# =========================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin Configuration
set -g @continuum-restore 'off'
TMUX_FZF_LAUNCH_KEY="F"

# Initialize TPM (Keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
